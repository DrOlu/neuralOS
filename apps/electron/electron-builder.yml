appId: com.gyshell.app
productName: GyShell
npmRebuild: false
afterPack: apps/electron/scripts/after-pack-linux.mjs
artifactBuildCompleted: apps/electron/scripts/normalize-linux-artifact-name.mjs
toolsets:
  # Use the newer AppImage runtime/toolset so Linux ARM64 builds do not rely on
  # the legacy AppImage runtime that has known loader issues on some systems.
  appimage: "1.0.2"
directories:
  output: dist
  buildResources: apps/electron/materials
files:
  - from: .
    filter:
      - out/**/*
      - apps/gybackend/dist/**/*
      - apps/gybackend/package.json
      - package.json
extraResources:
  - from: apps/electron/cli-runtime
    to: cli
    filter:
      - '**/*'
  - from: apps/electron/mobile-web-runtime
    to: mobile-web
    filter:
      - '**/*'
  - from: apps/electron/materials/icons/512x512.png
    to: icon.png
asarUnpack:
  - '**/*.node'
mac:
  icon: apps/electron/materials/icon.icns
  identity: "-"
  hardenedRuntime: false
  gatekeeperAssess: false
  entitlements: null
  extendInfo:
    LSMinimumSystemVersion: "12.0.0"
  target:
    - target: dmg
      arch:
        - arm64
  category: public.app-category.developer-tools
win:
  icon: apps/electron/materials/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  oneClick: true
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  artifactName: "${productName}.Setup.${version}-${arch}.${ext}"
portable:
  artifactName: "${productName}.Portable.${version}-${arch}.${ext}"
linux:
  icon: apps/electron/materials/icons
  executableName: gyshell
  target:
    - target: AppImage
    - target: deb
    - target: pacman
    - target: rpm
  category: Development
  desktop:
    entry:
      Name: GyShell
      Comment: AI-Native Terminal App
      StartupWMClass: gyshell
  artifactName: "${productName}-${version}-${arch}.${ext}"
appImage:
  artifactName: "${productName}-${version}-${arch}.${ext}"
deb:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  maintainer: "TUOTUO <tuotuo@gyshell.com>"
  # Post-install script restores chrome-sandbox SUID permissions and works
  # around electron-builder's 0x0 icon-size bug (#5294).
  afterInstall: apps/electron/scripts/postinstall-linux.sh
pacman:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  depends:
    - c-ares
    - ffmpeg
    - gtk3
    - libevent
    - libvpx
    - libxslt
    - libxss
    - minizip
    - nss
    - re2
    - snappy
    - libnotify
    - libappindicator-gtk3
rpm:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  # Post-install script restores chrome-sandbox SUID permissions and works
  # around electron-builder's 0x0 icon-size bug (#5294).
  afterInstall: apps/electron/scripts/postinstall-linux.sh
dmg:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file
